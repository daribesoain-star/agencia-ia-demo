<script>
// 1. Disable right-click
document.addEventListener('contextmenu', e => e.preventDefault());

// 2. Disable keyboard shortcuts (Ctrl+C, Ctrl+U, Ctrl+S, F12, Ctrl+Shift+I)
document.addEventListener('keydown', e => {
  if (e.ctrlKey && (e.key === 'c' || e.key === 'u' || e.key === 's' || e.key === 'a')) e.preventDefault();
  if (e.key === 'F12') e.preventDefault();
  if (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'J' || e.key === 'C')) e.preventDefault();
});

// 3. DevTools detection
let devToolsOpen = false;
const threshold = 160;
const checkDevTools = () => {
  const widthThreshold = window.outerWidth - window.innerWidth > threshold;
  const heightThreshold = window.outerHeight - window.innerHeight > threshold;
  if (widthThreshold || heightThreshold) {
    if (!devToolsOpen) {
      devToolsOpen = true;
      document.body.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100vh;background:#0a0b0f;color:#ef4444;font-family:monospace;font-size:24px;text-align:center;padding:20px">⚠️ Acceso no autorizado detectado.<br>Las herramientas de desarrollo están bloqueadas.<br>Cierra DevTools para continuar.</div>';
    }
  } else {
    if (devToolsOpen) {
      devToolsOpen = false;
      location.reload();
    }
  }
};
setInterval(checkDevTools, 1000);

// 4. Disable drag
document.addEventListener('dragstart', e => e.preventDefault());

// 5. Disable print
window.addEventListener('beforeprint', () => {
  document.body.style.display = 'none';
});
window.addEventListener('afterprint', () => {
  document.body.style.display = '';
});

// 6. Console warning
console.log('%c⚠️ ALTO', 'color:red;font-size:40px;font-weight:bold');
console.log('%cEste es un sistema protegido. El acceso no autorizado está prohibido.', 'color:red;font-size:16px');
</script>

<script type="text/babel">
const {useState,useEffect,useCallback}=React;
const {LineChart,Line,BarChart,Bar,AreaChart,Area,PieChart,Pie,Cell,XAxis,YAxis,CartesianGrid,Tooltip,ResponsiveContainer,Legend,RadarChart,Radar,PolarGrid,PolarAngleAxis,PolarRadiusAxis}=Recharts;

function Watermark({userEmail}) {
  const rows = 20;
  const cols = 8;
  return (
    <div className="watermark-overlay">
      <div style={{display:'flex',flexDirection:'column',gap:'60px',padding:'20px'}}>
        {Array.from({length:rows}).map((_,r) => (
          <div key={r} style={{display:'flex',gap:'80px',marginLeft: r%2 ? '100px' : '0'}}>
            {Array.from({length:cols}).map((_,c) => (
              <span key={c} className="watermark-text">{userEmail} • {new Date().toLocaleDateString('es-CL')}</span>
            ))}
          </div>
        ))}
      </div>
    </div>
  );
}

// ============================================
// LOGIN COMPONENT
// ============================================
function LoginPage({onLogin}) {
  const [email, setEmail] = useState('');
  const [password, setPassword] = useState('');
  const [error, setError] = useState('');
  const [loading, setLoading] = useState(false);
  const [showReset, setShowReset] = useState(false);
  const [resetSent, setResetSent] = useState(false);

  const handleLogin = async (e) => {
    e.preventDefault();
    setLoading(true);
    setError('');
    try {
      const userCred = await auth.signInWithEmailAndPassword(email, password);
      const user = userCred.user;
      // Check if email is verified
      if (!user.emailVerified) {
        setError('Tu email no ha sido verificado. Revisa tu bandeja de entrada.');
        await auth.signOut();
        setLoading(false);
        return;
      }
      // Check user role in Firestore
      const userDoc = await db.collection('users').doc(user.uid).get();
      if (!userDoc.exists) {
        setError('Tu cuenta no ha sido activada por un administrador.');
        await auth.signOut();
        setLoading(false);
        return;
      }
      const userData = userDoc.data();
      if (userData.status !== 'active') {
        setError('Tu cuenta está pendiente de activación por un administrador.');
        await auth.signOut();
        setLoading(false);
        return;
      }
      onLogin(user, userData);
    } catch (err) {
      if (err.code === 'auth/user-not-found' || err.code === 'auth/wrong-password' || err.code === 'auth/invalid-credential') {
        setError('Email o contraseña incorrectos.');
      } else if (err.code === 'auth/too-many-requests') {
        setError('Demasiados intentos. Intenta de nuevo en unos minutos.');
      } else {
        setError('Error de conexión. Intenta de nuevo.');
      }
    }
    setLoading(false);
  };

  const handleResetPassword = async () => {
    if (!email) { setError('Ingresa tu email primero'); return; }
    try {
      await auth.sendPasswordResetEmail(email);
      setResetSent(true);
      setError('');
    } catch (err) {
      setError('No se pudo enviar el email de recuperación.');
    }
  };

  const handleGoogleLogin = async () => {
    setLoading(true);
    setError('');
    try {
      const provider = new firebase.auth.GoogleAuthProvider();
      const result = await auth.signInWithPopup(provider);
      const user = result.user;
      const userDoc = await db.collection('users').doc(user.uid).get();
      if (!userDoc.exists) {
        setError('Tu cuenta no ha sido registrada por un administrador. Contacta al admin.');
        await auth.signOut();
        setLoading(false);
        return;
      }
      const userData = userDoc.data();
      if (userData.status !== 'active') {
        setError('Tu cuenta está pendiente de activación.');
        await auth.signOut();
        setLoading(false);
        return;
      }
      onLogin(user, userData);
    } catch (err) {
      setError('Error al iniciar sesión con Google.');
    }
    setLoading(false);
  };

  return (
    <div className="gradient-bg min-h-screen flex items-center justify-center p-4">
      <div className="w-full max-w-md">
        {/* Logo */}
        <div className="text-center mb-8">
          <div className="float-anim inline-block">
            <div className="w-20 h-20 bg-gradient-to-br from-violet-600 to-purple-800 rounded-2xl flex items-center justify-center text-3xl mx-auto mb-4 shadow-lg shadow-violet-500/30">
              🤖
            </div>
          </div>
          <h1 className="text-3xl font-bold text-white mb-2">Agencia IA</h1>
          <p className="text-gray-400">Marketing Intelligence Platform</p>
        </div>

        {/* Login Card */}
        <div className="bg-gray-900/80 backdrop-blur-xl border border-gray-800/60 rounded-2xl p-8 shadow-2xl">
          <h2 className="text-xl font-semibold text-white mb-6 text-center">Iniciar Sesión</h2>

          {error && (
            <div className="bg-red-500/10 border border-red-500/30 rounded-lg p-3 mb-4 text-red-400 text-sm">
              {error}
            </div>
          )}

          {resetSent && (
            <div className="bg-green-500/10 border border-green-500/30 rounded-lg p-3 mb-4 text-green-400 text-sm">
              ✅ Email de recuperación enviado. Revisa tu bandeja.
            </div>
          )}

          <form onSubmit={handleLogin} className="space-y-4">
            <div>
              <label className="block text-sm text-gray-400 mb-1">Email</label>
              <input
                type="email"
                value={email}
                onChange={e => setEmail(e.target.value)}
                className="w-full bg-gray-800/60 border border-gray-700 rounded-lg px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:border-violet-500 focus:ring-1 focus:ring-violet-500 transition"
                placeholder="tu@email.com"
                required
                style={{userSelect:'text',WebkitUserSelect:'text'}}
              />
            </div>
            <div>
              <label className="block text-sm text-gray-400 mb-1">Contraseña</label>
              <input
                type="password"
                value={password}
                onChange={e => setPassword(e.target.value)}
                className="w-full bg-gray-800/60 border border-gray-700 rounded-lg px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:border-violet-500 focus:ring-1 focus:ring-violet-500 transition"
                placeholder="••••••••"
                required
                style={{userSelect:'text',WebkitUserSelect:'text'}}
              />
            </div>

            <button
              type="submit"
              disabled={loading}
              className="w-full bg-gradient-to-r from-violet-600 to-purple-700 hover:from-violet-500 hover:to-purple-600 text-white font-semibold py-3 rounded-lg transition-all duration-200 disabled:opacity-50 glow-pulse"
            >
              {loading ? '⏳ Verificando...' : '🔐 Iniciar Sesión'}
            </button>
          </form>

          <div className="mt-4 flex items-center gap-3">
            <div className="flex-1 h-px bg-gray-800"></div>
            <span className="text-gray-500 text-sm">o</span>
            <div className="flex-1 h-px bg-gray-800"></div>
          </div>

          <button
            onClick={handleGoogleLogin}
            disabled={loading}
            className="w-full mt-4 bg-gray-800/60 border border-gray-700 hover:border-gray-600 text-white py-3 rounded-lg transition flex items-center justify-center gap-2"
          >
            <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
            Continuar con Google
          </button>

          <div className="mt-4 text-center">
            <button onClick={handleResetPassword} className="text-violet-400 hover:text-violet-300 text-sm transition">
              ¿Olvidaste tu contraseña?
            </button>
          </div>

          <div className="mt-6 bg-gray-800/40 rounded-lg p-3 text-center">
            <p className="text-gray-500 text-xs">🔒 Acceso restringido. Solo usuarios autorizados por el administrador pueden ingresar.</p>
          </div>
        </div>

        <p className="text-center text-gray-600 text-xs mt-6">© 2026 Agencia IA — Marketing Intelligence Platform</p>
      </div>
    </div>
  );
}

// ============================================
// ADMIN PANEL - USER MANAGEMENT
// ============================================
function AdminPanel({currentUser, userData, onBack}) {
  const [users, setUsers] = useState([]);
  const [newEmail, setNewEmail] = useState('');
  const [newRole, setNewRole] = useState('cliente');
  const [newName, setNewName] = useState('');
  const [creating, setCreating] = useState(false);
  const [message, setMessage] = useState('');
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    loadUsers();
  }, []);

  const loadUsers = async () => {
    try {
      const snapshot = await db.collection('users').orderBy('createdAt', 'desc').get();
      const userList = snapshot.docs.map(doc => ({id: doc.id, ...doc.data()}));
      setUsers(userList);
    } catch(e) { console.error(e); }
    setLoading(false);
  };

  const createUser = async (e) => {
    e.preventDefault();
    setCreating(true);
    setMessage('');
    try {
      // Create user in Firebase Auth with a temp password
      const tempPassword = 'Temp' + Math.random().toString(36).slice(2,10) + '!1';
      const userCred = await auth.createUserWithEmailAndPassword(newEmail, tempPassword);
      const newUser = userCred.user;

      // Send email verification
      await newUser.sendEmailVerification();

      // Send password reset so user sets their own password
      await auth.sendPasswordResetEmail(newEmail);

      // Create user document in Firestore
      await db.collection('users').doc(newUser.uid).set({
        email: newEmail,
        name: newName,
        role: newRole,
        status: 'active',
        createdBy: currentUser.uid,
        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
        lastLogin: null
      });

      // Re-authenticate as admin (creating a user signs in as that user)
      // We need to sign back in as the admin
      setMessage(`✅ Usuario ${newEmail} creado. Se envió email de verificación y link para crear contraseña.`);
      setNewEmail('');
      setNewName('');
      setNewRole('cliente');

      // Note: After createUserWithEmailAndPassword, the new user is signed in.
      // The admin needs to re-login. We'll handle this by reloading.
      setTimeout(() => {
        setMessage('⚠️ Firebase cambió la sesión al nuevo usuario. Debes volver a iniciar sesión como admin.');
      }, 2000);

      loadUsers();
    } catch (err) {
      if (err.code === 'auth/email-already-in-use') {
        setMessage('❌ Ese email ya está registrado.');
      } else {
        setMessage('❌ Error: ' + err.message);
      }
    }
    setCreating(false);
  };

  const toggleUserStatus = async (userId, currentStatus) => {
    const newStatus = currentStatus === 'active' ? 'suspended' : 'active';
    await db.collection('users').doc(userId).update({status: newStatus});
    loadUsers();
  };

  const deleteUser = async (userId, email) => {
    if (!confirm(`¿Eliminar usuario ${email}? Esta acción no se puede deshacer.`)) return;
    await db.collection('users').doc(userId).delete();
    loadUsers();
  };

  const roleColors = {
    admin: 'bg-red-500/20 text-red-400 border-red-500/30',
    vendedor: 'bg-blue-500/20 text-blue-400 border-blue-500/30',
    cliente: 'bg-green-500/20 text-green-400 border-green-500/30',
    soporte: 'bg-yellow-500/20 text-yellow-400 border-yellow-500/30'
  };

  return (
    <div className="min-h-screen bg-[#0a0b0f] p-6">
      <div className="max-w-5xl mx-auto">
        {/* Header */}
        <div className="flex items-center justify-between mb-8">
          <div>
            <h1 className="text-2xl font-bold text-white flex items-center gap-2">🛡️ Panel de Administración</h1>
            <p className="text-gray-400 mt-1">Gestión de usuarios y accesos</p>
          </div>
          <button onClick={onBack} className="bg-gray-800 hover:bg-gray-700 text-white px-4 py-2 rounded-lg transition">
            ← Volver al Dashboard
          </button>
        </div>

        {/* Create User Form */}
        <div className="bg-gray-900/60 border border-gray-800/60 rounded-xl p-6 mb-8">
          <h2 className="text-lg font-semibold text-white mb-4">➕ Crear Nuevo Usuario</h2>
          {message && (
            <div className={`rounded-lg p-3 mb-4 text-sm ${message.startsWith('✅') ? 'bg-green-500/10 text-green-400 border border-green-500/30' : message.startsWith('⚠️') ? 'bg-yellow-500/10 text-yellow-400 border border-yellow-500/30' : 'bg-red-500/10 text-red-400 border border-red-500/30'}`}>
              {message}
            </div>
          )}
          <form onSubmit={createUser} className="grid grid-cols-1 md:grid-cols-4 gap-4">
            <div>
              <label className="block text-sm text-gray-400 mb-1">Nombre</label>
              <input
                type="text"
                value={newName}
                onChange={e => setNewName(e.target.value)}
                className="w-full bg-gray-800/60 border border-gray-700 rounded-lg px-3 py-2 text-white text-sm focus:outline-none focus:border-violet-500"
                placeholder="Juan Pérez"
                required
                style={{userSelect:'text',WebkitUserSelect:'text'}}
              />
            </div>
            <div>
              <label className="block text-sm text-gray-400 mb-1">Email</label>
              <input
                type="email"
                value={newEmail}
                onChange={e => setNewEmail(e.target.value)}
                className="w-full bg-gray-800/60 border border-gray-700 rounded-lg px-3 py-2 text-white text-sm focus:outline-none focus:border-violet-500"
                placeholder="usuario@email.com"
                required
                style={{userSelect:'text',WebkitUserSelect:'text'}}
              />
            </div>
            <div>
              <label className="block text-sm text-gray-400 mb-1">Rol</label>
              <select
                value={newRole}
                onChange={e => setNewRole(e.target.value)}
                className="w-full bg-gray-800/60 border border-gray-700 rounded-lg px-3 py-2 text-white text-sm focus:outline-none focus:border-violet-500"
              >
                <option value="cliente">👤 Cliente</option>
                <option value="vendedor">💼 Vendedor</option>
                <option value="soporte">🎧 Soporte</option>
                <option value="admin">🛡️ Admin</option>
              </select>
            </div>
            <div className="flex items-end">
              <button
                type="submit"
                disabled={creating}
                className="w-full bg-violet-600 hover:bg-violet-500 text-white py-2 rounded-lg transition text-sm font-medium disabled:opacity-50"
              >
                {creating ? '⏳ Creando...' : '✅ Crear Usuario'}
              </button>
            </div>
          </form>
          <p className="text-gray-500 text-xs mt-3">El usuario recibirá un email de verificación y un link para crear su contraseña.</p>
        </div>

        {/* Users Table */}
        <div className="bg-gray-900/60 border border-gray-800/60 rounded-xl overflow-hidden">
          <div className="p-4 border-b border-gray-800/60">
            <h2 className="text-lg font-semibold text-white">👥 Usuarios Registrados ({users.length})</h2>
          </div>
          {loading ? (
            <div className="p-8 text-center text-gray-400">Cargando usuarios...</div>
          ) : (
            <div className="overflow-x-auto">
              <table className="w-full">
                <thead>
                  <tr className="border-b border-gray-800/60 text-gray-400 text-sm">
                    <th className="text-left p-3">Usuario</th>
                    <th className="text-left p-3">Rol</th>
                    <th className="text-left p-3">Estado</th>
                    <th className="text-left p-3">Creado</th>
                    <th className="text-right p-3">Acciones</th>
                  </tr>
                </thead>
                <tbody>
                  {users.map(u => (
                    <tr key={u.id} className="border-b border-gray-800/30 hover:bg-gray-800/20">
                      <td className="p-3">
                        <div className="text-white text-sm font-medium">{u.name || '—'}</div>
                        <div className="text-gray-500 text-xs">{u.email}</div>
                      </td>
                      <td className="p-3">
                        <span className={`text-xs px-2 py-1 rounded-full border ${roleColors[u.role] || 'bg-gray-500/20 text-gray-400'}`}>
                          {u.role}
                        </span>
                      </td>
                      <td className="p-3">
                        <span className={`text-xs ${u.status === 'active' ? 'text-green-400' : u.status === 'pending' ? 'text-yellow-400' : 'text-red-400'}`}>
                          {u.status === 'active' ? '🟢 Activo' : u.status === 'pending' ? '🟡 Pendiente' : '🔴 Suspendido'}
                        </span>
                      </td>
                      <td className="p-3 text-gray-400 text-xs">
                        {u.createdAt ? new Date(u.createdAt.seconds * 1000).toLocaleDateString('es-CL') : '—'}
                      </td>
                      <td className="p-3 text-right">
                        <button
                          onClick={() => toggleUserStatus(u.id, u.status)}
                          className="text-xs bg-gray-800 hover:bg-gray-700 text-gray-300 px-2 py-1 rounded mr-1 transition"
                        >
                          {u.status === 'active' ? '⏸ Suspender' : '▶ Activar'}
                        </button>
                        <button
                          onClick={() => deleteUser(u.id, u.email)}

                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

function App() {
  const [authState, setAuthState] = useState('loading'); // loading, login, dashboard, admin
  const [currentUser, setCurrentUser] = useState(null);
  const [userData, setUserData] = useState(null);

  useEffect(() => {
    const unsubscribe = auth.onAuthStateChanged(async (user) => {
      if (user && user.emailVerified) {
        try {
          const userDoc = await db.collection('users').doc(user.uid).get();
          if (userDoc.exists && userDoc.data().status === 'active') {
            setCurrentUser(user);
            setUserData(userDoc.data());
            // Update last login
            db.collection('users').doc(user.uid).update({lastLogin: firebase.firestore.FieldValue.serverTimestamp()});
            setAuthState('dashboard');
          } else {
            setAuthState('login');
          }
        } catch(e) {
          setAuthState('login');
        }
      } else {
        setAuthState('login');
      }
    });
    return () => unsubscribe();
  }, []);

  const handleLogin = (user, data) => {
    setCurrentUser(user);
    setUserData(data);
    setAuthState('dashboard');
  };

  const handleLogout = async () => {
    await auth.signOut();
    setCurrentUser(null);
    setUserData(null);
    setAuthState('login');
  };

  if (authState === 'loading') {
    return (
      <div className="min-h-screen bg-[#0a0b0f] flex items-center justify-center">
        <div className="text-center">
          <div className="w-16 h-16 bg-gradient-to-br from-violet-600 to-purple-800 rounded-2xl flex items-center justify-center text-2xl mx-auto mb-4 animate-pulse">🤖</div>
          <p className="text-gray-400 animate-pulse">Verificando acceso...</p>
        </div>
      </div>
    );
  }

  if (authState === 'login') {
    return <LoginPage onLogin={handleLogin} />;
  }

  if (authState === 'admin') {
    return <AdminPanel currentUser={currentUser} userData={userData} onBack={() => setAuthState('dashboard')} />;
  }

  return (
    <Dashboard
      user={currentUser}
      userData={userData}
      onLogout={handleLogout}
      onAdmin={() => setAuthState('admin')}
    />
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
