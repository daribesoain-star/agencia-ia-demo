function Stat({label,value,prev,format,icon}){

const dv=format==="money"?fmt(value):format==="pct"?`${value}%`:format==="x"?`${value}x`:value?.toLocaleString?.("es-CL")||value;

<div className="text-white font-bold text-xl">{dv}</div>
{ch&&<div className="flex items-center gap-1.5 mt-1"><span className={`text-xs font-bold ${ch.pos?"text-emerald-400":"text-red-400"}`}>{ch.pos?"\u2191":"\u2193"} {Math.abs(ch.value)}%</span><span className="text-gray-600 text-[10px]">vs mes anterior</span></div>}
</div>)}

return <span className={`px-2 py-0.5 rounded-full text-[10px] font-bold border ${s[status]||""}`}>{l[status]||status}</span>}

{[{k:"autonomy",l:"Autonom\u00EDa",ic:"\u{1F9E0}",d:"Cu\u00E1ntas decisiones toma solo"},{k:"creativity",l:"Creatividad",ic:"\u{1F3A8}",d:"Variaci\u00F3n en copy y creativos"},{k:"budget",l:"Libertad Budget",ic:"\u{1F4B0}",d:"% del presupuesto que puede mover"},{k:"speed",l:"Velocidad",ic:"\u26A1",d:"Qu\u00E9 tan r\u00E1pido ejecuta cambios"}].map(({k,l,ic,d})=><div key={k} className="mb-4">

{item.a?<span className="text-[9px] text-emerald-500/70 bg-emerald-500/10 px-1.5 rounded">auto</span>:item.on?<span className="text-[9px] text-amber-400/70 bg-amber-500/10 px-1.5 rounded">pide OK</span>:null}
<div className={`w-7 h-3.5 rounded-full flex items-center px-0.5 cursor-pointer ${item.on?"bg-violet-600 justify-end":"bg-gray-700 justify-start"}`}><div className="w-2.5 h-2.5 bg-white rounded-full"></div></div>
</div></div>)}

<div className="space-y-4">

</div></div>
<div className="bg-gradient-to-br from-violet-500/10 to-fuchsia-500/10 border border-violet-500/20 rounded-xl p-4">

</div>}

{/* CONTENT */}
{view==="content"&&<div className="bg-gray-900/40 border border-gray-800/50 rounded-xl p-5">

{["Lun","Mar","Mi\u00E9","Jue","Vie","S\u00E1b","Dom"].map(d=><div key={d} className="text-center text-gray-600 text-[10px] font-bold uppercase pb-2">{d}</div>)}
{[{day:24,c:"Carousel: Tips riego",p:"IG",s:"published"},{day:25,c:"Reel: Tutorial fertilizaci\u00F3n",p:"IG+FB",s:"scheduled"},{day:26,c:"Post: Promo semillas",p:"FB",s:"draft"},{day:27,c:"Story: Behind the scenes",p:"IG",s:"draft"},{day:28,c:"Video: Unboxing kit riego",p:"TikTok",s:"idea"},{day:29,c:"Carousel: Gu\u00EDa de poda",p:"IG",s:"idea"},{day:30,c:"Post: Testimonio cliente",p:"FB+IG",s:"idea"}].map((item,i)=>{
const sc={published:"border-emerald-500/40 bg-emerald-500/10",scheduled:"border-blue-500/40 bg-blue-500/10",draft:"border-amber-500/30 bg-amber-500/5",idea:"border-gray-700/40 bg-gray-800/30"};
return <div key={i} className={`border rounded-lg p-2.5 ${sc[item.s]} min-h-[80px]`}><div className="text-white text-xs font-bold mb-1">{item.day}</div><div className="text-gray-300 text-[10px] leading-tight mb-1">{item.c}</div><div className="text-gray-500 text-[9px]">{item.p}</div></div>})}
</div>
<div className="flex items-center gap-4 mt-3">
{[{l:"Publicado",c:"bg-emerald-500/40"},{l:"Programado",c:"bg-blue-500/40"},{l:"Borrador",c:"bg-amber-500/30"},{l:"Idea IA",c:"bg-gray-700/40"}].map((s,i)=><div key={i} className="flex items-center gap-1.5"><span className={`w-2.5 h-2.5 rounded ${s.c}`}></span><span className="text-gray-500 text-[10px]">{s.l}</span></div>)}
</div></div>}

</div></main></div>)}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
